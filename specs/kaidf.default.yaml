version: "1.0"
repo:
  name: "kobkob-kaidf"
  files:
    - path: "README.md"
      content: "library:root/README.md"
    - path: "LICENSE"
      content: "library:root/LICENSE"
    - path: "CODEOWNERS"
      content: "library:root/CODEOWNERS"
    - path: "SECURITY.md"
      content: "library:root/SECURITY.md"

sections:
  - path: "docs/00-overview"
    files:
      - path: "kaidf.md"
        content: "library:docs/00-overview/kaidf.md"
      - path: "glossary.md"
        content: "library:docs/00-overview/glossary.md"
      - path: "principles.md"
        content: "library:docs/00-overview/principles.md"
      - path: "decision-rights.md"
        content: "library:docs/00-overview/decision-rights.md"

  - path: "docs/01-intent-constraints"
    files:
      - path: "README.md"
        inline: "# Phase 1 — Intent & Constraints\n\nDeliverable: Intent & Constraint Brief (ICB)\n"
      - path: "templates/ICB.md"
        content: "library:docs/01-intent-constraints/templates/ICB.md"
      - path: "templates/constraint-matrix.csv"
        content: "library:docs/01-intent-constraints/templates/constraint-matrix.csv"
      - path: "prompts/framing.prompt.md"
        content: "library:docs/01-intent-constraints/prompts/framing.prompt.md"
      - path: "exit-criteria.md"
        inline: |
          # Exit Criteria (Phase 1)
          - ICB completed
          - Constraints acknowledged
          - Success metrics defined
          - Stakeholder sign-off recorded
