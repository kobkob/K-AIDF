contract_version: 1

repository:
  required_root_files:
    - README.md
    - LICENSE
    - CODEOWNERS
  optional_root_files:
    - SECURITY.md

  required_directories:
    - docs/00-overview
    - docs/01-intent-constraints

document_classes:
  core-doc:
    description: Human-readable methodology or project document.
    match:
      - README.md
      - docs/**/*.md

  template-doc:
    description: Reusable fill-in artifact.
    match:
      - docs/**/templates/*

  prompt-doc:
    description: Prompt input for guided execution.
    match:
      - docs/**/prompts/*.prompt.md

  governance-doc:
    description: Repository governance artifact.
    match:
      - LICENSE
      - CODEOWNERS
      - SECURITY.md

stable_id:
  type: repo_relative_path

metadata:
  required_front_matter: false
  v2_plan:
    required_front_matter: true
    applies_first_to:
      - README.md
      - docs/**/*.md
    format: yaml_front_matter
    required_fields:
      - id
      - title
      - document_class
      - phase
      - visibility
      - status
    field_definitions:
      id:
        type: string
        uniqueness: repository
        preferred_fetch_id: true
      title:
        type: string
      document_class:
        type: enum
        values:
          - core-doc
          - template-doc
          - prompt-doc
          - governance-doc
      phase:
        type: string
        examples:
          - 00-overview
          - 01-intent-constraints
      visibility:
        type: enum
        values:
          - public
          - internal
          - private
      status:
        type: enum
        values:
          - draft
          - active
          - deprecated
          - archived

indexing:
  default_include:
    - README.md
    - docs/**/*.md
    - docs/**/*.csv
  prompts_exposed_by_default: true
  v2_behavior:
    prefer_metadata_id: true
    exclude_private_by_default: true
    include_internal_by_default: true
    return_metadata_fields:
      - id
      - title
      - document_class
      - phase
      - visibility
      - status

editing:
  agent_editable:
    - README.md
    - docs/**/*.md
    - docs/**/*.csv
  protected_from_implicit_renames:
    - README.md
    - docs/**
